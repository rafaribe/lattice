<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beagrid — Inference Grid</title>
    <style>
        :root, [data-theme="dark"] {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface-2: #242836;
            --border: #2d3248;
            --text: #e4e7ec;
            --text-dim: #8b92a5;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.3);
            --green: #10b981;
            --red: #ef4444;
            --yellow: #f59e0b;
            --radius: 10px;
        }
        [data-theme="light"] {
            --bg: #f8f9fc;
            --surface: #ffffff;
            --surface-2: #f0f2f5;
            --border: #e2e5ea;
            --text: #1a1d27;
            --text-dim: #6b7280;
            --accent: #4f46e5;
            --accent-glow: rgba(79, 70, 229, 0.15);
            --green: #059669;
            --red: #dc2626;
            --yellow: #d97706;
            --radius: 10px;
        }
        [data-theme="nord"] {
            --bg: #2e3440;
            --surface: #3b4252;
            --surface-2: #434c5e;
            --border: #4c566a;
            --text: #eceff4;
            --text-dim: #d8dee9;
            --accent: #88c0d0;
            --accent-glow: rgba(136, 192, 208, 0.25);
            --green: #a3be8c;
            --red: #bf616a;
            --yellow: #ebcb8b;
            --radius: 8px;
        }
        [data-theme="dracula"] {
            --bg: #282a36;
            --surface: #44475a;
            --surface-2: #383a4a;
            --border: #6272a4;
            --text: #f8f8f2;
            --text-dim: #bd93f9;
            --accent: #ff79c6;
            --accent-glow: rgba(255, 121, 198, 0.25);
            --green: #50fa7b;
            --red: #ff5555;
            --yellow: #f1fa8c;
            --radius: 8px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }
        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { display: flex; align-items: center; gap: 0.5rem; font-size: 1.25rem; font-weight: 700; }
        .logo svg { width: 26px; height: 26px; }
        .header-right { display: flex; align-items: center; gap: 0.75rem; }
        .version-badge {
            padding: 0.2rem 0.5rem;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 0.7rem;
            font-family: monospace;
            color: var(--text-dim);
        }
        .status-badge {
            display: flex; align-items: center; gap: 0.4rem;
            padding: 0.3rem 0.7rem;
            background: var(--surface-2);
            border-radius: 99px;
            font-size: 0.8rem;
        }
        .pulse { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
        .pulse.offline { background: var(--red); animation: none; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* Settings button */
        .settings-btn {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.4rem;
            cursor: pointer;
            color: var(--text-dim);
            display: flex;
            transition: color 0.2s;
        }
        .settings-btn:hover { color: var(--accent); }
        .settings-btn svg { width: 18px; height: 18px; }

        /* Settings panel */
        .settings-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
        }
        .settings-overlay.open { display: flex; justify-content: flex-end; }
        .settings-panel {
            width: 300px;
            max-width: 90vw;
            background: var(--surface);
            border-left: 1px solid var(--border);
            padding: 1.5rem;
            height: 100vh;
            overflow-y: auto;
        }
        .settings-panel h3 { margin-bottom: 1rem; font-size: 1.1rem; }
        .settings-group { margin-bottom: 1.5rem; }
        .settings-group label { display: block; font-size: 0.8rem; color: var(--text-dim); margin-bottom: 0.4rem; }
        .theme-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
        }
        .theme-option {
            padding: 0.5rem;
            border: 2px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
            font-size: 0.8rem;
            transition: border-color 0.2s;
        }
        .theme-option.active { border-color: var(--accent); }
        .theme-option:hover { border-color: var(--accent); }
        .theme-swatch {
            width: 100%; height: 20px;
            border-radius: 3px;
            margin-bottom: 0.3rem;
        }

        main { padding: 1.5rem; max-width: 1400px; margin: 0 auto; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem;
            text-align: center;
        }
        .stat-value { font-size: 2rem; font-weight: 700; color: var(--accent); }
        .stat-label { font-size: 0.75rem; color: var(--text-dim); margin-top: 0.2rem; }

        .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 0.75rem; }

        /* Topology — small, squared */
        .topology-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            aspect-ratio: 2 / 1;
            max-height: 200px;
        }
        .topology-container svg { width: 100%; height: 100%; }

        .nodes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }
        .node-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }
        .node-card:hover { border-color: var(--accent); box-shadow: 0 0 12px var(--accent-glow); }
        .node-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--green); }
        .node-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.75rem; }
        .node-name { font-size: 1rem; font-weight: 600; }
        .node-id { font-size: 0.65rem; color: var(--text-dim); font-family: monospace; }
        .node-status { padding: 0.15rem 0.5rem; border-radius: 99px; font-size: 0.65rem; font-weight: 600; text-transform: uppercase; background: rgba(16,185,129,0.15); color: var(--green); }
        .node-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 0.3rem; margin-bottom: 0.75rem; font-size: 0.8rem; }
        .node-meta dt { color: var(--text-dim); }
        .node-meta dd { color: var(--text); font-weight: 500; }
        .model-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; }
        .model-tag { background: var(--surface-2); border: 1px solid var(--border); padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.7rem; font-family: monospace; }

        .empty-state { text-align: center; padding: 3rem 1.5rem; color: var(--text-dim); }
        .empty-state h2 { font-size: 1.2rem; margin-bottom: 0.4rem; color: var(--text); }
        .empty-state code { background: var(--surface-2); padding: 0.15rem 0.4rem; border-radius: 3px; font-size: 0.8rem; }

        .refresh-indicator { font-size: 0.7rem; color: var(--text-dim); text-align: right; margin-bottom: 0.4rem; }

        footer { text-align: center; padding: 1.5rem; color: var(--text-dim); font-size: 0.75rem; border-top: 1px solid var(--border); }

        @media (max-width: 768px) {
            header { padding: 0.5rem 1rem; }
            main { padding: 1rem; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .nodes-grid { grid-template-columns: 1fr; }
            .stat-value { font-size: 1.5rem; }
            .topology-container { max-height: 150px; }
            .settings-panel { width: 260px; }
        }
        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr 1fr; gap: 0.5rem; }
            .stat-card { padding: 0.75rem; }
            .stat-value { font-size: 1.3rem; }
            .version-badge { display: none; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <svg viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="14" stroke="currentColor" stroke-width="2" opacity="0.3"/><circle cx="16" cy="16" r="4" fill="var(--accent)"/><circle cx="8" cy="8" r="2" fill="var(--green)"/><circle cx="24" cy="8" r="2" fill="var(--green)"/><circle cx="8" cy="24" r="2" fill="var(--green)"/><circle cx="24" cy="24" r="2" fill="var(--green)"/><line x1="16" y1="16" x2="8" y2="8" stroke="var(--accent)" stroke-width="1" opacity="0.5"/><line x1="16" y1="16" x2="24" y2="8" stroke="var(--accent)" stroke-width="1" opacity="0.5"/><line x1="16" y1="16" x2="8" y2="24" stroke="var(--accent)" stroke-width="1" opacity="0.5"/><line x1="16" y1="16" x2="24" y2="24" stroke="var(--accent)" stroke-width="1" opacity="0.5"/></svg>
            Beagrid
        </div>
        <div class="header-right">
            <span class="version-badge" id="version-badge">...</span>
            <div class="status-badge">
                <span class="pulse" id="pulse-dot"></span>
                <span id="connection-status">...</span>
            </div>
            <button class="settings-btn" onclick="toggleSettings()" title="Settings">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68 1.65 1.65 0 0 0 10 3.17V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.32 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </button>
        </div>
    </header>

    <!-- Settings Panel -->
    <div class="settings-overlay" id="settings-overlay" onclick="closeSettings(event)">
        <div class="settings-panel" onclick="event.stopPropagation()">
            <h3>⚙️ Settings</h3>
            <div class="settings-group">
                <label>Theme</label>
                <div class="theme-grid">
                    <div class="theme-option" data-theme="dark" onclick="setTheme('dark')">
                        <div class="theme-swatch" style="background: linear-gradient(135deg, #0f1117, #1a1d27)"></div>
                        Dark
                    </div>
                    <div class="theme-option" data-theme="light" onclick="setTheme('light')">
                        <div class="theme-swatch" style="background: linear-gradient(135deg, #f8f9fc, #ffffff)"></div>
                        Light
                    </div>
                    <div class="theme-option" data-theme="nord" onclick="setTheme('nord')">
                        <div class="theme-swatch" style="background: linear-gradient(135deg, #2e3440, #88c0d0)"></div>
                        Nord
                    </div>
                    <div class="theme-option" data-theme="dracula" onclick="setTheme('dracula')">
                        <div class="theme-swatch" style="background: linear-gradient(135deg, #282a36, #ff79c6)"></div>
                        Dracula
                    </div>
                </div>
            </div>
            <div class="settings-group">
                <label>Refresh interval</label>
                <select id="refresh-interval" onchange="setRefreshInterval(this.value)" style="width:100%;padding:0.4rem;background:var(--surface-2);color:var(--text);border:1px solid var(--border);border-radius:4px;">
                    <option value="3000">3s</option>
                    <option value="5000" selected>5s</option>
                    <option value="10000">10s</option>
                    <option value="30000">30s</option>
                </select>
            </div>
        </div>
    </div>

    <main>
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-value" id="stat-nodes">-</div><div class="stat-label">Engines</div></div>
            <div class="stat-card"><div class="stat-value" id="stat-models">-</div><div class="stat-label">Models</div></div>
            <div class="stat-card"><div class="stat-value" id="stat-tasks">-</div><div class="stat-label">Active Tasks</div></div>
            <div class="stat-card"><div class="stat-value" id="stat-ttl">-</div><div class="stat-label">TTL</div></div>
        </div>

        <div class="section-title">Grid Topology</div>
        <div class="topology-container"><svg id="topo" viewBox="0 0 400 180"></svg></div>

        <div class="refresh-indicator" id="refresh-indicator">—</div>
        <div class="section-title">Connected Engines</div>
        <div class="nodes-grid" id="nodes-grid">
            <div class="empty-state"><h2>No engines connected</h2><p><code>beagrid join --at http://ollama:11434/v1 -m model</code></p></div>
        </div>
    </main>
    <footer>Beagrid — <span id="grid-name">home</span></footer>

    <script>
    const API = window.location.origin;
    let interval = 5000;
    let timer;

    // --- Theme ---
    function setTheme(t) {
        document.documentElement.setAttribute('data-theme', t);
        localStorage.setItem('beagrid-theme', t);
        document.querySelectorAll('.theme-option').forEach(el => el.classList.toggle('active', el.dataset.theme === t));
    }
    function loadTheme() {
        const t = localStorage.getItem('beagrid-theme') || 'dark';
        setTheme(t);
    }

    // --- Settings ---
    function toggleSettings() { document.getElementById('settings-overlay').classList.toggle('open'); }
    function closeSettings(e) { if (e.target === e.currentTarget) toggleSettings(); }
    function setRefreshInterval(ms) {
        interval = parseInt(ms);
        localStorage.setItem('beagrid-refresh', ms);
        clearInterval(timer);
        timer = setInterval(fetchAll, interval);
    }

    // --- Data ---
    async function fetchAll() {
        try {
            const [info, disc, ver] = await Promise.all([
                fetch(`${API}/grid/info`).then(r=>r.json()),
                fetch(`${API}/nodes/discover`).then(r=>r.json()),
                fetch(`${API}/version`).then(r=>r.json()),
            ]);
            const nodes = disc.engines || [];
            updateVersion(ver);
            updateStats(info, nodes);
            updateTopology(nodes);
            updateNodes(nodes);
            document.getElementById('grid-name').textContent = info.name || 'home';
            setConnected(true);
            document.getElementById('refresh-indicator').textContent = `Updated ${new Date().toLocaleTimeString()}`;
        } catch { setConnected(false); }
    }

    function setConnected(ok) {
        document.getElementById('connection-status').textContent = ok ? 'Online' : 'Offline';
        document.getElementById('pulse-dot').className = ok ? 'pulse' : 'pulse offline';
    }
    function updateVersion(v) { document.getElementById('version-badge').textContent = v.version || 'dev'; }
    function updateStats(info, nodes) {
        document.getElementById('stat-nodes').textContent = info.engines_online || 0;
        const models = new Set();
        let tasks = 0;
        nodes.forEach(n => { (n.models||[]).forEach(m => models.add(m)); tasks += n.load?.active_tasks || 0; });
        document.getElementById('stat-models').textContent = models.size;
        document.getElementById('stat-tasks').textContent = tasks;
        document.getElementById('stat-ttl').textContent = (info.node_ttl_seconds||60)+'s';
    }

    function updateTopology(nodes) {
        const svg = document.getElementById('topo');
        if (!nodes.length) { svg.innerHTML = '<text x="200" y="90" text-anchor="middle" fill="var(--text-dim)" font-size="12">No engines</text>'; return; }
        const cx=200, cy=90, r=65;
        let h = '';
        nodes.forEach((n,i) => {
            const a = (2*Math.PI*i/nodes.length) - Math.PI/2;
            const nx = cx + r*Math.cos(a), ny = cy + r*Math.sin(a);
            h += `<line x1="${cx}" y1="${cy}" x2="${nx}" y2="${ny}" stroke="var(--border)" stroke-width="1.5" stroke-dasharray="3,3"/>`;
            h += `<rect x="${nx-22}" y="${ny-14}" width="44" height="28" rx="4" fill="var(--surface-2)" stroke="var(--green)" stroke-width="1.5"/>`;
            h += `<text x="${nx}" y="${ny-2}" text-anchor="middle" fill="var(--text)" font-size="7" font-weight="600">${esc((n.name||'node').slice(0,7))}</text>`;
            h += `<text x="${nx}" y="${ny+8}" text-anchor="middle" fill="var(--text-dim)" font-size="6">${(n.models||[]).length}m</text>`;
        });
        h += `<rect x="${cx-24}" y="${cy-16}" width="48" height="32" rx="6" fill="var(--accent)" opacity="0.9"/>`;
        h += `<text x="${cx}" y="${cy-2}" text-anchor="middle" fill="white" font-size="7" font-weight="700">BEAGRID</text>`;
        h += `<text x="${cx}" y="${cy+8}" text-anchor="middle" fill="white" font-size="6" opacity="0.8">SERVER</text>`;
        svg.innerHTML = h;
    }

    function updateNodes(nodes) {
        const g = document.getElementById('nodes-grid');
        if (!nodes.length) { g.innerHTML = '<div class="empty-state"><h2>No engines</h2><p><code>beagrid join --at URL -m model</code></p></div>'; return; }
        g.innerHTML = nodes.map(n => `
        <div class="node-card">
            <div class="node-header">
                <div><div class="node-name">${esc(n.name||n.node_id)}</div><div class="node-id">${n.node_id||''}</div></div>
                <span class="node-status">online</span>
            </div>
            <dl class="node-meta">
                <dt>Role</dt><dd>${n.role||'engine'}</dd>
                <dt>Seen</dt><dd>${timeAgo(n.last_heartbeat)}</dd>
                <dt>Tasks</dt><dd>${n.load?.active_tasks||0}</dd>
                <dt>Endpoint</dt><dd style="font-size:0.65rem;word-break:break-all">${esc(n.endpoint_url||'-')}</dd>
            </dl>
            <div class="model-tags">${(n.models||[]).map(m=>`<span class="model-tag">${esc(m)}</span>`).join('')}</div>
        </div>`).join('');
    }

    function timeAgo(ts) { if(!ts)return'-'; const d=(Date.now()-new Date(ts).getTime())/1000; return d<60?Math.round(d)+'s':d<3600?Math.round(d/60)+'m':Math.round(d/3600)+'h'; }
    function esc(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

    // Init
    loadTheme();
    const savedInterval = localStorage.getItem('beagrid-refresh');
    if (savedInterval) { interval = parseInt(savedInterval); document.getElementById('refresh-interval').value = savedInterval; }
    fetchAll();
    timer = setInterval(fetchAll, interval);
    </script>
</body>
</html>
