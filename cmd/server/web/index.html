<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beagrid — Inference Grid</title>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface-2: #242836;
            --border: #2d3248;
            --text: #e4e7ec;
            --text-dim: #8b92a5;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.3);
            --green: #10b981;
            --red: #ef4444;
            --yellow: #f59e0b;
            --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.5rem;
            font-weight: 700;
        }
        .logo svg { width: 32px; height: 32px; }
        .header-right { display: flex; align-items: center; gap: 1rem; }
        .version-badge {
            padding: 0.3rem 0.7rem;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.75rem;
            font-family: monospace;
            color: var(--text-dim);
        }
        .status-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: var(--surface-2);
            border-radius: 99px;
            font-size: 0.85rem;
        }
        .pulse {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--green);
            animation: pulse 2s infinite;
        }
        .pulse.offline { background: var(--red); animation: none; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        main { padding: 2rem; max-width: 1400px; margin: 0 auto; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem;
            text-align: center;
        }
        .stat-value { font-size: 2.5rem; font-weight: 700; color: var(--accent); }
        .stat-label { font-size: 0.85rem; color: var(--text-dim); margin-top: 0.25rem; }
        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .topology-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 300px;
        }
        .topology-container svg { max-width: 100%; height: auto; }
        .nodes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .node-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }
        .node-card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .node-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: var(--green);
        }
        .node-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }
        .node-name { font-size: 1.1rem; font-weight: 600; }
        .node-id { font-size: 0.75rem; color: var(--text-dim); font-family: monospace; }
        .node-status {
            padding: 0.25rem 0.75rem;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            background: rgba(16, 185, 129, 0.15);
            color: var(--green);
        }
        .node-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            margin-bottom: 1rem;
            font-size: 0.85rem;
        }
        .node-meta dt { color: var(--text-dim); }
        .node-meta dd { color: var(--text); font-weight: 500; }
        .model-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; }
        .model-tag {
            background: var(--surface-2);
            border: 1px solid var(--border);
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-family: monospace;
        }
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-dim);
        }
        .empty-state h2 { font-size: 1.5rem; margin-bottom: 0.5rem; color: var(--text); }
        .empty-state code {
            background: var(--surface-2);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.85rem;
        }
        .refresh-indicator {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-align: right;
            margin-bottom: 0.5rem;
        }
        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-dim);
            font-size: 0.8rem;
            border-top: 1px solid var(--border);
        }
        @media (max-width: 768px) {
            header { padding: 0.75rem 1rem; }
            main { padding: 1rem; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .nodes-grid { grid-template-columns: 1fr; }
            .stat-value { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="16" cy="16" r="14" stroke="#6366f1" stroke-width="2"/>
                <circle cx="16" cy="16" r="4" fill="#6366f1"/>
                <circle cx="8" cy="8" r="2.5" fill="#10b981"/>
                <circle cx="24" cy="8" r="2.5" fill="#10b981"/>
                <circle cx="8" cy="24" r="2.5" fill="#10b981"/>
                <circle cx="24" cy="24" r="2.5" fill="#10b981"/>
                <line x1="16" y1="16" x2="8" y2="8" stroke="#6366f1" stroke-width="1" opacity="0.6"/>
                <line x1="16" y1="16" x2="24" y2="8" stroke="#6366f1" stroke-width="1" opacity="0.6"/>
                <line x1="16" y1="16" x2="8" y2="24" stroke="#6366f1" stroke-width="1" opacity="0.6"/>
                <line x1="16" y1="16" x2="24" y2="24" stroke="#6366f1" stroke-width="1" opacity="0.6"/>
            </svg>
            Beagrid
        </div>
        <div class="header-right">
            <span class="version-badge" id="version-badge">...</span>
            <div class="status-badge">
                <span class="pulse" id="pulse-dot"></span>
                <span id="connection-status">Connecting...</span>
            </div>
        </div>
    </header>
    <main>
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="stat-nodes">-</div>
                <div class="stat-label">Engines Online</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-models">-</div>
                <div class="stat-label">Unique Models</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-tasks">-</div>
                <div class="stat-label">Active Tasks</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-ttl">-</div>
                <div class="stat-label">Node TTL</div>
            </div>
        </div>

        <h2 class="section-title">🌐 Grid Topology</h2>
        <div class="topology-container" id="topology-container">
            <svg id="topology-svg" viewBox="0 0 500 300" xmlns="http://www.w3.org/2000/svg"></svg>
        </div>

        <div class="refresh-indicator" id="refresh-indicator">Last refresh: -</div>
        <h2 class="section-title">⚡ Connected Engines</h2>
        <div class="nodes-grid" id="nodes-grid">
            <div class="empty-state">
                <h2>No engines connected</h2>
                <p>Run: <code>beagrid join --at http://your-ollama:11434/v1 -m llama3.2:latest</code></p>
            </div>
        </div>
    </main>
    <footer>Beagrid — Open-source inference grid • <span id="grid-name">home</span></footer>

    <script>
    const API = window.location.origin;
    let lastRefresh = null;

    async function fetchAll() {
        try {
            const [infoRes, discoverRes, versionRes] = await Promise.all([
                fetch(`${API}/grid/info`),
                fetch(`${API}/nodes/discover`),
                fetch(`${API}/version`),
            ]);
            const info = await infoRes.json();
            const discover = await discoverRes.json();
            const ver = await versionRes.json();
            const nodes = discover.engines || [];

            updateVersion(ver);
            updateStats(info, nodes);
            updateTopology(nodes);
            updateNodes(nodes);
            updateFooter(info);
            setConnected(true);
            lastRefresh = new Date();
            document.getElementById('refresh-indicator').textContent = `Last refresh: ${lastRefresh.toLocaleTimeString()}`;
        } catch (err) {
            setConnected(false);
        }
    }

    function setConnected(ok) {
        document.getElementById('connection-status').textContent = ok ? 'Connected' : 'Disconnected';
        document.getElementById('pulse-dot').className = ok ? 'pulse' : 'pulse offline';
    }

    function updateVersion(ver) {
        document.getElementById('version-badge').textContent = `v${ver.version || 'dev'}`;
    }

    function updateFooter(info) {
        document.getElementById('grid-name').textContent = info.name || 'home';
    }

    function updateStats(info, nodes) {
        document.getElementById('stat-nodes').textContent = info.engines_online || 0;
        const models = new Set();
        let totalTasks = 0;
        nodes.forEach(n => {
            (n.models || []).forEach(m => models.add(m));
            totalTasks += n.load?.active_tasks || 0;
        });
        document.getElementById('stat-models').textContent = models.size;
        document.getElementById('stat-tasks').textContent = totalTasks;
        document.getElementById('stat-ttl').textContent = (info.node_ttl_seconds || 60) + 's';
    }

    function updateTopology(nodes) {
        const svg = document.getElementById('topology-svg');
        if (!nodes || nodes.length === 0) {
            svg.innerHTML = `
                <text x="250" y="150" text-anchor="middle" fill="#8b92a5" font-size="14">No engines connected</text>
            `;
            return;
        }

        const cx = 250, cy = 150, radius = 110;
        let html = '';

        // Draw lines from center to each node
        nodes.forEach((node, i) => {
            const angle = (2 * Math.PI * i / nodes.length) - Math.PI / 2;
            const nx = cx + radius * Math.cos(angle);
            const ny = cy + radius * Math.sin(angle);
            html += `<line x1="${cx}" y1="${cy}" x2="${nx}" y2="${ny}" stroke="#2d3248" stroke-width="2" stroke-dasharray="4,4"/>`;
            html += `<line x1="${cx}" y1="${cy}" x2="${nx}" y2="${ny}" stroke="#10b981" stroke-width="1.5" opacity="0.6">
                <animate attributeName="stroke-dashoffset" from="20" to="0" dur="2s" repeatCount="indefinite"/>
            </line>`;
        });

        // Draw node circles
        nodes.forEach((node, i) => {
            const angle = (2 * Math.PI * i / nodes.length) - Math.PI / 2;
            const nx = cx + radius * Math.cos(angle);
            const ny = cy + radius * Math.sin(angle);
            const name = (node.name || 'node').slice(0, 8);
            const modelCount = (node.models || []).length;
            html += `
                <circle cx="${nx}" cy="${ny}" r="24" fill="#242836" stroke="#10b981" stroke-width="2"/>
                <text x="${nx}" y="${ny - 4}" text-anchor="middle" fill="#e4e7ec" font-size="9" font-weight="600">${esc(name)}</text>
                <text x="${nx}" y="${ny + 10}" text-anchor="middle" fill="#8b92a5" font-size="8">${modelCount} model${modelCount !== 1 ? 's' : ''}</text>
            `;
        });

        // Draw server center
        html += `
            <circle cx="${cx}" cy="${cy}" r="30" fill="#6366f1" opacity="0.9"/>
            <circle cx="${cx}" cy="${cy}" r="30" fill="none" stroke="#6366f1" stroke-width="2">
                <animate attributeName="r" values="30;34;30" dur="3s" repeatCount="indefinite"/>
                <animate attributeName="opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite"/>
            </circle>
            <text x="${cx}" y="${cy - 4}" text-anchor="middle" fill="white" font-size="9" font-weight="700">BEAGRID</text>
            <text x="${cx}" y="${cy + 9}" text-anchor="middle" fill="white" font-size="8" opacity="0.8">SERVER</text>
        `;

        svg.innerHTML = html;
    }

    function updateNodes(nodes) {
        const grid = document.getElementById('nodes-grid');
        if (!nodes || nodes.length === 0) {
            grid.innerHTML = `<div class="empty-state"><h2>No engines connected</h2><p>Run: <code>beagrid join --at http://your-ollama:11434/v1 -m llama3.2:latest</code></p></div>`;
            return;
        }
        grid.innerHTML = nodes.map(node => {
            const name = node.name || node.node_id || '?';
            return `
            <div class="node-card">
                <div class="node-header">
                    <div>
                        <div class="node-name">${esc(name)}</div>
                        <div class="node-id">${node.node_id || ''}</div>
                    </div>
                    <span class="node-status">online</span>
                </div>
                <dl class="node-meta">
                    <dt>Role</dt><dd>${node.role || 'engine'}</dd>
                    <dt>Last Seen</dt><dd>${timeAgo(node.last_heartbeat)}</dd>
                    <dt>Active Tasks</dt><dd>${node.load?.active_tasks || 0}</dd>
                    <dt>Endpoint</dt><dd style="font-size:0.7rem;word-break:break-all">${esc(node.endpoint_url || node.media_url || '-')}</dd>
                </dl>
                <div class="model-tags">
                    ${(node.models || []).map(m => `<span class="model-tag">${esc(m)}</span>`).join('')}
                </div>
            </div>`;
        }).join('');
    }

    function timeAgo(ts) {
        if (!ts) return 'never';
        const diff = (Date.now() - new Date(ts).getTime()) / 1000;
        if (diff < 60) return `${Math.round(diff)}s ago`;
        if (diff < 3600) return `${Math.round(diff/60)}m ago`;
        return `${Math.round(diff/3600)}h ago`;
    }

    function esc(s) {
        const d = document.createElement('div');
        d.textContent = s || '';
        return d.innerHTML;
    }

    fetchAll();
    setInterval(fetchAll, 5000);
    </script>
</body>
</html>
