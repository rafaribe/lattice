<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beagrid — Statistics</title>
    <style>
        :root, [data-theme="dark"] { --bg:#0f1117;--surface:#1a1d27;--surface-2:#242836;--border:#2d3248;--text:#e4e7ec;--text-dim:#8b92a5;--accent:#6366f1;--accent-glow:rgba(99,102,241,0.3);--green:#10b981;--red:#ef4444;--yellow:#f59e0b;--radius:10px; }
        [data-theme="light"] { --bg:#f8f9fc;--surface:#ffffff;--surface-2:#f0f2f5;--border:#e2e5ea;--text:#1a1d27;--text-dim:#6b7280;--accent:#4f46e5;--accent-glow:rgba(79,70,229,0.15);--green:#059669;--red:#dc2626;--yellow:#d97706; }
        [data-theme="nord"] { --bg:#2e3440;--surface:#3b4252;--surface-2:#434c5e;--border:#4c566a;--text:#eceff4;--text-dim:#d8dee9;--accent:#88c0d0;--accent-glow:rgba(136,192,208,0.25);--green:#a3be8c;--red:#bf616a;--yellow:#ebcb8b; }
        [data-theme="dracula"] { --bg:#282a36;--surface:#44475a;--surface-2:#383a4a;--border:#6272a4;--text:#f8f8f2;--text-dim:#bd93f9;--accent:#ff79c6;--accent-glow:rgba(255,121,198,0.25);--green:#50fa7b;--red:#ff5555;--yellow:#f1fa8c; }
        [data-theme="catppuccin-latte"] { --bg:#eff1f5;--surface:#e6e9ef;--surface-2:#dce0e8;--border:#ccd0da;--text:#4c4f69;--text-dim:#6c6f85;--accent:#8839ef;--accent-glow:rgba(136,57,239,0.15);--green:#40a02b;--red:#d20f39;--yellow:#df8e1d; }
        [data-theme="catppuccin-frappe"] { --bg:#303446;--surface:#292c3c;--surface-2:#414559;--border:#51576d;--text:#c6d0f5;--text-dim:#a5adce;--accent:#ca9ee6;--accent-glow:rgba(202,158,230,0.25);--green:#a6d189;--red:#e78284;--yellow:#e5c890; }
        [data-theme="catppuccin-macchiato"] { --bg:#24273a;--surface:#1e2030;--surface-2:#363a4f;--border:#494d64;--text:#cad3f5;--text-dim:#a5adcb;--accent:#c6a0f6;--accent-glow:rgba(198,160,246,0.25);--green:#a6da95;--red:#ed8796;--yellow:#eed49f; }
        [data-theme="catppuccin-mocha"] { --bg:#1e1e2e;--surface:#181825;--surface-2:#313244;--border:#45475a;--text:#cdd6f4;--text-dim:#a6adc8;--accent:#cba6f7;--accent-glow:rgba(203,166,247,0.25);--green:#a6e3a1;--red:#f38ba8;--yellow:#f9e2af; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
        header { background:var(--surface); border-bottom:1px solid var(--border); padding:0.75rem 1.5rem; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
        .logo { display:flex; align-items:center; gap:0.5rem; font-size:1.25rem; font-weight:700; text-decoration:none; color:var(--text); }
        .logo svg { width:26px; height:26px; }
        nav { display:flex; gap:1rem; }
        nav a { color:var(--text-dim); text-decoration:none; font-size:0.85rem; padding:0.3rem 0.6rem; border-radius:4px; transition:color 0.2s,background 0.2s; }
        nav a:hover, nav a.active { color:var(--accent); background:var(--surface-2); }
        main { padding:1.5rem; max-width:1400px; margin:0 auto; }
        .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1.5rem; }
        .grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:1rem; margin-bottom:1.5rem; }
        .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1.25rem; }
        .card h3 { font-size:0.9rem; color:var(--text-dim); margin-bottom:1rem; font-weight:500; }
        .big-stat { font-size:3rem; font-weight:700; color:var(--accent); }
        .big-stat-label { font-size:0.8rem; color:var(--text-dim); margin-top:0.25rem; }
        .bar-chart { display:flex; flex-direction:column; gap:0.5rem; }
        .bar-row { display:flex; align-items:center; gap:0.5rem; }
        .bar-label { font-size:0.75rem; min-width:120px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--text-dim); font-family:monospace; }
        .bar-track { flex:1; height:20px; background:var(--surface-2); border-radius:4px; overflow:hidden; }
        .bar-fill { height:100%; background:var(--accent); border-radius:4px; transition:width 0.5s ease; display:flex; align-items:center; padding-left:0.4rem; }
        .bar-value { font-size:0.65rem; color:white; font-weight:600; }
        .timeline { display:flex; align-items:flex-end; gap:2px; height:80px; }
        .timeline-bar { flex:1; background:var(--accent); border-radius:2px 2px 0 0; min-width:4px; opacity:0.7; transition:height 0.3s; }
        .timeline-bar:hover { opacity:1; }
        .stat-row { display:flex; justify-content:space-between; align-items:center; padding:0.5rem 0; border-bottom:1px solid var(--border); }
        .stat-row:last-child { border-bottom:none; }
        .stat-key { font-size:0.8rem; color:var(--text-dim); }
        .stat-val { font-size:0.85rem; font-weight:600; }
        .status-dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:0.4rem; }
        .status-dot.on { background:var(--green); }
        .status-dot.off { background:var(--red); }
        @media (max-width:768px) { .grid-2,.grid-3 { grid-template-columns:1fr; } }
    </style>
</head>
<body>
    <header>
        <a href="/" class="logo">
            <svg viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="14" stroke="currentColor" stroke-width="2" opacity="0.3"/><circle cx="16" cy="16" r="4" fill="var(--accent)"/></svg>
            Beagrid
        </a>
        <nav>
            <a href="/">Dashboard</a>
            <a href="/stats.html" class="active">Statistics</a>
        </nav>
    </header>
    <main>
        <div class="grid-3">
            <div class="card">
                <h3>Total Engines</h3>
                <div class="big-stat" id="s-engines">-</div>
                <div class="big-stat-label">currently online</div>
            </div>
            <div class="card">
                <h3>Available Models</h3>
                <div class="big-stat" id="s-models">-</div>
                <div class="big-stat-label">unique models across grid</div>
            </div>
            <div class="card">
                <h3>Uptime</h3>
                <div class="big-stat" id="s-uptime">-</div>
                <div class="big-stat-label">server running</div>
            </div>
        </div>

        <div class="grid-2">
            <div class="card">
                <h3>Model Distribution</h3>
                <div class="bar-chart" id="model-chart"></div>
            </div>
            <div class="card">
                <h3>Engine Load</h3>
                <div class="bar-chart" id="load-chart"></div>
            </div>
        </div>

        <div class="grid-2">
            <div class="card">
                <h3>Heartbeat History (last 60 samples)</h3>
                <div class="timeline" id="heartbeat-timeline"></div>
            </div>
            <div class="card">
                <h3>Grid Details</h3>
                <div id="grid-details"></div>
            </div>
        </div>

        <div class="grid-2">
            <div class="card">
                <h3>Engines</h3>
                <div id="engine-list"></div>
            </div>
            <div class="card">
                <h3>Model Availability</h3>
                <div id="model-list"></div>
            </div>
        </div>
    </main>

    <script>
    const API = window.location.origin;
    let heartbeatHistory = [];
    const MAX_HISTORY = 60;

    // Load theme from localStorage (shared with main UI)
    const t = localStorage.getItem('beagrid-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', t);

    async function fetchStats() {
        try {
            const [info, disc, ver] = await Promise.all([
                fetch(`${API}/grid/info`).then(r=>r.json()),
                fetch(`${API}/nodes/discover`).then(r=>r.json()),
                fetch(`${API}/version`).then(r=>r.json()),
            ]);
            const nodes = disc.engines || [];
            render(info, nodes, ver);
        } catch(e) { console.error(e); }
    }

    function render(info, nodes, ver) {
        // Big stats
        document.getElementById('s-engines').textContent = info.engines_online || 0;
        const models = new Set();
        nodes.forEach(n => (n.models||[]).forEach(m => models.add(m)));
        document.getElementById('s-models').textContent = models.size;
        document.getElementById('s-uptime').textContent = formatUptime(ver.uptime || '');

        // Model distribution
        const modelCount = {};
        nodes.forEach(n => (n.models||[]).forEach(m => { modelCount[m] = (modelCount[m]||0) + 1; }));
        const maxModel = Math.max(...Object.values(modelCount), 1);
        document.getElementById('model-chart').innerHTML = Object.entries(modelCount)
            .sort((a,b) => b[1]-a[1])
            .slice(0, 10)
            .map(([m,c]) => `
                <div class="bar-row">
                    <span class="bar-label" title="${esc(m)}">${esc(m)}</span>
                    <div class="bar-track"><div class="bar-fill" style="width:${(c/maxModel)*100}%"><span class="bar-value">${c} engine${c>1?'s':''}</span></div></div>
                </div>`).join('') || '<div style="color:var(--text-dim);font-size:0.8rem;">No models</div>';

        // Engine load
        const maxLoad = Math.max(...nodes.map(n => n.load?.active_tasks||0), 1);
        document.getElementById('load-chart').innerHTML = nodes.map(n => {
            const load = n.load?.active_tasks || 0;
            return `<div class="bar-row">
                <span class="bar-label" title="${esc(n.name)}">${esc((n.name||'?').slice(0,14))}</span>
                <div class="bar-track"><div class="bar-fill" style="width:${Math.max((load/maxLoad)*100, 5)}%;background:${load>3?'var(--yellow)':load>0?'var(--accent)':'var(--green)'}"><span class="bar-value">${load} tasks</span></div></div>
            </div>`;
        }).join('') || '<div style="color:var(--text-dim);font-size:0.8rem;">No engines</div>';

        // Heartbeat timeline
        heartbeatHistory.push(nodes.length);
        if (heartbeatHistory.length > MAX_HISTORY) heartbeatHistory.shift();
        const maxH = Math.max(...heartbeatHistory, 1);
        document.getElementById('heartbeat-timeline').innerHTML = heartbeatHistory
            .map(v => `<div class="timeline-bar" style="height:${Math.max((v/maxH)*100,5)}%" title="${v} engines"></div>`)
            .join('');

        // Grid details
        document.getElementById('grid-details').innerHTML = `
            <div class="stat-row"><span class="stat-key">Grid ID</span><span class="stat-val" style="font-family:monospace;font-size:0.7rem;">${info.grid_id}</span></div>
            <div class="stat-row"><span class="stat-key">Grid Name</span><span class="stat-val">${info.name}</span></div>
            <div class="stat-row"><span class="stat-key">Type</span><span class="stat-val">${info.grid_type}</span></div>
            <div class="stat-row"><span class="stat-key">Node TTL</span><span class="stat-val">${info.node_ttl_seconds}s</span></div>
            <div class="stat-row"><span class="stat-key">Auth Required</span><span class="stat-val">${info.auth_required ? 'Yes' : 'No'}</span></div>
            <div class="stat-row"><span class="stat-key">Version</span><span class="stat-val">${ver.version}</span></div>
        `;

        // Engine list
        document.getElementById('engine-list').innerHTML = nodes.map(n => `
            <div class="stat-row">
                <span class="stat-key"><span class="status-dot on"></span>${esc(n.name||n.node_id)}</span>
                <span class="stat-val">${(n.models||[]).length} models</span>
            </div>
        `).join('') || '<div style="color:var(--text-dim);font-size:0.8rem;">No engines online</div>';

        // Model list with availability
        document.getElementById('model-list').innerHTML = [...models].sort().map(m => {
            const count = modelCount[m] || 0;
            return `<div class="stat-row">
                <span class="stat-key" style="font-family:monospace;">${esc(m)}</span>
                <span class="stat-val" style="color:var(--green);">${count}× available</span>
            </div>`;
        }).join('') || '<div style="color:var(--text-dim);font-size:0.8rem;">No models available</div>';
    }

    function formatUptime(s) {
        if (!s) return '-';
        // Parse Go duration like "2h15m30.123s"
        const h = s.match(/(\d+)h/); const m = s.match(/(\d+)m/);
        if (h) return `${h[1]}h ${m?m[1]:'0'}m`;
        if (m) return `${m[1]}m`;
        return s.replace(/\.\d+s/,'s');
    }

    function esc(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

    fetchStats();
    setInterval(fetchStats, 5000);
    </script>
</body>
</html>
