# Lattice — Local Development Compose
#
# Usage:
#   docker compose up                      # server + agent → 10.0.0.98 Ollama (default)
#   docker compose --profile local up      # server + local ollama + agent → local ollama
#   docker compose --profile gpu up        # server + local ollama (GPU) + agent → local ollama
#
# The server UI is at http://localhost:8099/ui/

services:
  # Lattice server — the central grid endpoint
  server:
    build:
      context: .
      dockerfile: deploy/Dockerfile.server
    ports:
      - "8099:8090"
    command:
      - --port=8090
      - --name=home
      - --node-ttl=120
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8090/healthz"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # Lattice agent — registers 10.0.0.98 Windows Ollama with the server (DEFAULT)
  agent:
    build:
      context: .
      dockerfile: deploy/Dockerfile.agent
    command:
      - --server=http://server:8090
      - --ollama=http://10.0.0.98:11434
      - --name=windows-gpu
      - --heartbeat-interval=15
      - --poll-interval=300
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  # --- LOCAL PROFILE: Use when 10.0.0.98 is not available ---

  # Local Ollama instance (CPU only)
  ollama:
    image: ollama/ollama:latest
    profiles: ["local"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -q --spider http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Agent pointing at local Ollama (only with local profile)
  agent-local:
    build:
      context: .
      dockerfile: deploy/Dockerfile.agent
    profiles: ["local"]
    command:
      - --server=http://server:8090
      - --ollama=http://ollama:11434
      - --name=local-ollama
      - --heartbeat-interval=15
    depends_on:
      server:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped

  # Local Ollama with GPU passthrough
  ollama-gpu:
    image: ollama/ollama:latest
    profiles: ["gpu"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -q --spider http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  ollama_data:
