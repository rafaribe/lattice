version: 2

before:
  hooks:
    - go mod tidy
    - go test ./... -race -count=1

builds:
  - id: lattice
    main: ./cmd/lattice
    binary: lattice
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: lattice-server
    main: ./cmd/server
    binary: lattice-server
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: lattice-agent
    main: ./cmd/agent
    binary: lattice-agent
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: lattice
    builds:
      - lattice
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

  - id: server-agent
    builds:
      - lattice-server
      - lattice-agent
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}-server_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^chore:"
      - "^docs:"
      - "^ci:"

release:
  github:
    owner: rafaribe
    name: lattice
  prerelease: auto
  name_template: "{{.Tag}}"
